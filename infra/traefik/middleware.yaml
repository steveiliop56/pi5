apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: infra
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tinyauth
  namespace: infra
spec:
  forwardAuth:
    address: http://tinyauth.tinyauth.svc.cluster.local:3000
    authResponseHeaders: remote-user,remote-name,remote-email,remote-groups,remote-sub,authorization
