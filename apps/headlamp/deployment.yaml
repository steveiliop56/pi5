kind: Deployment
apiVersion: apps/v1
metadata:
  name: headlamp
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.41.0
          args:
            - "-in-cluster"
            - "-plugins-dir=/headlamp/plugins"
          env:
            - name: HEADLAMP_CONFIG_TRACING_ENABLED
              value: "true"
            - name: HEADLAMP_CONFIG_METRICS_ENABLED
              value: "true"
            - name: HEADLAMP_CONFIG_OTLP_ENDPOINT
              value: "otel-collector:4317"
            - name: HEADLAMP_CONFIG_SERVICE_NAME
              value: "headlamp"
            - name: HEADLAMP_CONFIG_SERVICE_VERSION
              value: "v0.41.0"
            - name: HEADLAMP_CONFIG_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc-secret
                  key: HEADLAMP_CONFIG_OIDC_CLIENT_ID
            - name: HEADLAMP_CONFIG_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc-secret
                  key: HEADLAMP_CONFIG_OIDC_CLIENT_SECRET
            - name: HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc-secret
                  key: HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL
            - name: HEADLAMP_CONFIG_OIDC_SCOPES
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc-secret
                  key: HEADLAMP_CONFIG_OIDC_SCOPES
          ports:
            - containerPort: 4466
              name: http
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /
              port: 4466
            initialDelaySeconds: 30
            timeoutSeconds: 30
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /
              port: 4466
            initialDelaySeconds: 30
            timeoutSeconds: 30
      nodeSelector:
        "kubernetes.io/os": linux
