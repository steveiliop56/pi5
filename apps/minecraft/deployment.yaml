apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-dp
  namespace: minecraft
  labels:
    app: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: ghcr.io/itzg/minecraft-server:java25-alpine
          ports:
            - containerPort: 25565
              name: minecraft
          volumeMounts:
            - name: minecraft-data
              mountPath: /data
          env:
            - name: EULA
              value: "TRUE"
      volumes:
        - name: minecraft-data
          hostPath:
            path: /mnt/ssd/app-data/minecraft/data
            type: DirectoryOrCreate
