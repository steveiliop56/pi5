apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyauth-dp
  namespace: tinyauth
  labels:
    app: tinyauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyauth
  template:
    metadata:
      labels:
        app: tinyauth
    spec:
      containers:
        - name: tinyauth
          image: ghcr.io/steveiliop56/tinyauth:v5.1.0-alpha.1
          ports:
            - containerPort: 3000
              name: web
          envFrom:
            - secretRef:
                name: tinyauth-secret
          volumeMounts:
            - name: tinyauth-data
              mountPath: /data
      volumes:
        - name: tinyauth-data
          hostPath:
            path: /mnt/ssd/app-data/tinyauth/data
            type: DirectoryOrCreate
